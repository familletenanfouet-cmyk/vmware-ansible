name: "Terraform Docker Kali"

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  terraform:
    name: "Deploy Kali with Terraform"
    # TRÈS IMPORTANT : On utilise 'self-hosted' car c'est VOTRE PC qui a Docker
    runs-on: self-hosted 

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        run: terraform init

      - name: Terraform Apply
        # On passe le token secret de GitHub ici
        run: terraform apply -auto-approve -var="github_token=${{ secrets.GHP_TOKEN }}"
